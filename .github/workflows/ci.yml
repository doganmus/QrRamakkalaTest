name: ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  no-conflict-markers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fail if merge conflict markers exist
        run: |
          if git grep -nE '^(<<<<<<<|=======|>>>>>>>)' -- .; then
            echo "Merge conflict markers found. Resolve conflicts before pushing."
            exit 1
          fi

  backend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm run lint
      - run: npm run build

  docker-compose-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - run: docker compose config
