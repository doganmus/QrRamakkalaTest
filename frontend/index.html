<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>İSG QR Uygulaması - Skeleton</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 2rem; }
      .ok { color: green; }
      .err { color: #b00020; }
      code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <h1>İSG QR Bildirim Uygulaması</h1>
    <p>Frontend skeleton çalışıyor.</p>
    <p>Backend health endpoint kontrolü: <code>/api/v1/health</code></p>
    <div id="status">Kontrol ediliyor...</div>

    <script>
      fetch('/api/v1/health')
        .then(r => r.json())
        .then(data => {
          document.getElementById('status').innerHTML = `<span class="ok">Backend OK</span> - ${data.time}`;
        })
        .catch(() => {
          document.getElementById('status').innerHTML = '<span class="err">Backend erişilemedi</span>';
        });
    </script>
  </body>
</html>
